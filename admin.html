<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Casa Nanquim</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="apple-touch-icon" href="img/logo.png">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div id="loginScreen" class="login-container">
  <div class="login-card">
    <a href="index.html" style="text-decoration: none; display: block;">
      <img src="img/logo.png" alt="Casa Nanquim" style="height: 80px; margin: 0 auto 20px; display: block; cursor: pointer;">
    </a>
    <h2><i class="fas fa-lock me-2"></i>Admin Login</h2>
    <form id="loginForm">
      <div class="mb-3">
        <input type="text" class="form-control" id="username" placeholder="Usuário" required>
      </div>
      <div class="mb-3">
        <input type="password" class="form-control" id="password" placeholder="Senha" required>
      </div>
      <button type="submit" class="btn">Entrar</button>
      <div id="loginError" class="error-message"></div>
    </form>
  </div>
</div>

<div id="adminPanel" class="admin-container">
  <div class="admin-header">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-3">
          <a href="index.html" style="text-decoration: none;">
            <img src="img/logo.png" alt="Casa Nanquim" style="height: 40px; cursor: pointer;">
          </a>
          <h1 class="mb-0"><i class="fas me-2"></i>Painel Admin | Casa Nanquim</h1>
        </div>
        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt me-2"></i>Sair</button>
      </div>
    </div>
  </div>
  
  <div class="container mt-4">
    <div class="row g-4 mb-4">
      <div class="col-md-3">
        <div class="stats-card">
          <i class="fas fa-calendar fa-2x mb-2"></i>
          <h3 id="totalReservas">0</h3>
          <p>Total de Reservas</p>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stats-card">
          <i class="fas fa-clock fa-2x mb-2"></i>
          <h3 id="totalHoras">0</h3>
          <p>Horas Totais</p>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stats-card">
          <i class="fas fa-money-bill fa-2x mb-2"></i>
          <h3 id="totalValor">R$ 0</h3>
          <p>Valor Total</p>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stats-card">
          <i class="fas fa-chart-line fa-2x mb-2"></i>
          <h3 id="totalConfirmados">0</h3>
          <p>Confirmados</p>
        </div>
      </div>
    </div>
    
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <div>
        <button class="refresh-btn" id="refreshBtn"><i class="fas fa-sync-alt me-2"></i>Atualizar</button>
      </div>
      <div>
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 Buscar por nome, data, WhatsApp...">
      </div>
    </div>
    
    <div class="table-container">
      <div id="tableLoading" class="loading" style="display: none;">
        <div class="spinner"></div>
        <p>Carregando...</p>
      </div>
      <div id="tableContent"></div>
    </div>
  </div>
</div>

<div id="editModal" class="modal">
  <div class="modal-content">
    <h3><i class="fas fa-edit me-2"></i>Editar Reserva</h3>
    <form id="editForm">
      <input type="hidden" id="editRowId">
      <label>Nome</label>
      <input type="text" id="editNome" class="form-control" required>
      <label>WhatsApp</label>
      <input type="text" id="editWhatsapp" class="form-control" required>
      <label>Email</label>
      <input type="email" id="editEmail" class="form-control">
      <label>Data</label>
      <input type="date" id="editData" class="form-control" required>
      <label>Horário Início</label>
      <input type="text" id="editHorario" class="form-control" required placeholder="10:00">
      <label>Duração</label>
      <select id="editDuracao" class="form-control">
        <option value="2h">2 horas - R$ 80,00</option>
        <option value="4h">4 horas - R$ 150,00</option>
        <option value="8h">8 horas - R$ 250,00</option>
      </select>
      <label>Status</label>
      <select id="editStatus" class="form-control">
        <option value="Pendente">Pendente</option>
        <option value="Confirmado">Confirmado</option>
        <option value="Cancelado">Cancelado</option>
        <option value="Concluído">Concluído</option>
      </select>
      <div class="modal-buttons mt-3">
        <button type="button" class="btn-cancel" id="closeModalBtn">Cancelar</button>
        <button type="submit" class="btn-save">Salvar</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
